<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-white">
  
  <header class="d-flex justify-content-between align-items-center p-3 flex-wrap position-relative">

    <div class="d-flex align-items-center gap-3">
      <button class="browse-btn btn" id="browseBtn">
        <img src="raw/menu-w.png" alt="Menu" width="24" height="24">
      </button>
      <div class="text-white fs-2 d-none d-lg-block fw-bold">Cineverse</div>
    </div>

    <div class="d-flex justify-content-center align-items-centre gap-2">
      <a href='Movies.html' class="head-btn btn d-none d-lg-block text-white">Movies</a>
      <a href='tv shows.html' class="head-btn btn  d-none d-lg-block text-white ">TV Shows</a>
    </div>
  
    <div class="position-absolute top-50 start-50 translate-middle d-lg-none">
      <div class="text-white text-center fw-bold" style="font-size: 2rem;">Cineverse</div>
    </div>


    <div class="d-flex justify-content-center text-center align-items-center gap-2">
      <a class="watchlist-btn btn d-none d-lg-block" id="watchlistbtn">WatchList</a>
      <button class="login-btn btn" id="loginbtn">
        <img src="raw/login-4.png" alt="Menu" width="30" height="30">
      </button>
    </div>
  

    <div class="side-menu" id="sideMenu">
      <ul class="list-unstyled">
        <li>
          <div class="back">
            <button class="menu-btn fs-3"><img src="raw/back.png" alt="Menu" width="35" height="35" onclick="closeSideMenu()"> Back</button>
          </div>
        </li>
        <li>
            <a class="menu-btn btn d-lg-none">WatchList</a>
        </li>
        <li>
          <a href='Movies.html' class="menu-btn btn bg-danger d-lg-none">Movies</a>
      </li>
      <li>
        <a href='tv shows.html' class="menu-btn btn bg-danger d-lg-none">TV Shows</a>
      </li>
        <li>
          <button class="menu-btn" onclick="toggleSubMenu('genres')">Genres ▾</button>
          <ul class="submenu" id="genres">
            <div class="d-flex flex-column flex-lg-row gap-2 mb-2">
              <a href='action.html' class="btn text-white btn-outline-danger category-btn" data-category="Action">Action</a>
              <a href='Comedy.html' class="btn text-white btn-outline-danger category-btn" data-category="Comedy">Comedy</a>
            </div>
            <div class="d-flex flex-column flex-lg-row gap-2 mb-2">
              <a href='Drama.html' class="btn text-white btn-outline-danger category-btn" data-category="Drama">Drama</a>
              <a onclick="location.href='adventure.html'" class="btn text-white btn-outline-danger category-btn" data-category="Adventure">Adventure</a>
            </div>
            <div class="d-flex flex-column flex-lg-row gap-2 mb-2">
              <a href='Horror.html' class="btn text-white btn-outline-danger category-btn" data-category="Horror">Horror</a>
              <a href='War.html' class="btn text-white btn-outline-danger category-btn" data-category="War">War</a>
            </div>
          </ul>
        </li>
        <li>
          <button class="menu-btn" onclick="toggleSubMenu('trending')">Trending ▾</button>
          <ul class="submenu" id="trending">
            <div class="d-flex flex-column flex-lg-row gap-2 mb-2">
              <a href='Trending today.html' class="btn text-white btn-outline-danger category-btn" data-category="Horror">Today</a>
              <a href='This Week.html' class="btn text-white btn-outline-danger category-btn" data-category="War">This Week</a>
            </div>
          </ul>
        </li>
        <li>
          <button class="menu-btn" onclick="toggleSubMenu('topRated')">Top Rated ▾</button>
          <ul class="submenu" id="topRated">
            <div class="d-flex flex-column flex-lg-row gap-2 mb-2">
              <a href='All time.html' class="btn text-white btn-outline-danger category-btn" data-category="Horror">All Time</a>
              <a href='This Year.html' class="btn text-white btn-outline-danger category-btn" data-category="War">This Year</a>
            </div>
          </ul>
        </li>
      </ul>
    </div>
  </header>

  <div class="d-flex justify-content-between align-items-center m-4">
    <h1 class="mb-4">Search Results for "<span id="searchQuery"></span>"</h1>
    <a href="index.html" class="btn btn-danger fw-bold text-white" style="background-color: #ff6347; border-radius: 10px;">
        ← Home</a>
  </div>

  <section class="container py-5">
    <div class="d-flex flex-wrap gap-4 justify-content-center" id="resultsContainer">
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const apiKey = '447bbae2e176863ed6ad30d6b10ecdd9';

      const urlquery = new URLSearchParams(window.location.search);
      const query = urlquery.get('query');
      document.getElementById('searchQuery').textContent = query;

      const searchUrl = `https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${encodeURIComponent(query)}`;

      fetch(searchUrl)
        .then(response => response.json())
        .then(data => {
          const resultsContainer = document.getElementById('resultsContainer');
          if (data.results.length === 0) {
            resultsContainer.innerHTML = '<p>No results found.</p>';
            return;
          }
          
          const movies = data.results;
          movies.forEach(movie => {
            if (!movie.poster_path) return;
            
            const title = movie.title || movie.name || "No Title";
            const poster = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;

            const moviecard = document.createElement('div');
            moviecard.classList.add('movie-card');
            moviecard.innerHTML = `
              <a href="movie-details.html?id=${movie.id}">
                  <img src="${poster}" alt="${title}" style="width: 200px; border-radius: 10px;">
                  <h5 class="mt-2">${title}</h5>
              </a>`;

            resultsContainer.appendChild(moviecard);
          });
        })
        .catch(error => {
          console.error('Search error:', error);
          document.getElementById('resultsContainer').innerHTML = '<p>Error loading results.</p>';
        });
    });
  </script>

</body>
</html>
