      <div class="d-flex justify-content-between align-items-center m-4">

        <a href="index.html" class="btn btn-danger fw-bold text-white" style="background-color: #ff6347; border-radius: 10px;">
            ← Home</a>
      </div>

    <div class="movie-details" id="movieDetails">
        <p>Loading movie details...</p>
    </div>

    <script src="script.js" defer></script>
    <script>
        const apiKey = '447bbae2e176863ed6ad30d6b10ecdd9'; 
        const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');

        fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${apiKey}&append_to_response=credits`)
        .then(response => response.json())
        .then(movie => {
            const container = document.getElementById('movieDetails');
            const genres = movie.genres.map(g => g.name).join(', ');
            const cast = movie.credits.cast.slice(0, 5).map(c => c.name).join(', ');
            const director = movie.credits.crew.find(p => p.job === 'Director')?.name || 'N/A';

            container.innerHTML = `
            <h1>${movie.title}</h1>
            <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}">
            <div class="info">
                <p><strong>Rating:</strong> ${movie.vote_average}</p>
                <p><strong>Genres:</strong> ${genres}</p>
                <p><strong>Plot:</strong> ${movie.overview}</p>
                <p><strong>Release Year:</strong> ${movie.release_date.split('-')[0]}</p>
                <p><strong>Cast:</strong> ${cast}</p>
                <p><strong>Director:</strong> ${director}</p>
            </div>
            `;
        })
        .catch(err => {
            console.error('Failed to load movie:', err);
            document.getElementById('movieDetails').innerHTML = '<p>Error loading movie.</p>';
        });
    </script>

    <footer class="text-center text-white py-3">
